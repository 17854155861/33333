<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API 点数查询工具</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 600px;
    }

    /* Logo & Title */
    .header {
      text-align: center;
      margin-bottom: 32px;
    }
    .header .logo {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, #1e78ff, #00c6ff);
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
      box-shadow: 0 8px 32px rgba(30,120,255,0.4);
    }
    .header .logo svg { width: 28px; height: 28px; fill: #fff; }
    .header h1 {
      color: #fff;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 1px;
    }
    .header p {
      color: rgba(255,255,255,0.5);
      font-size: 13px;
      margin-top: 6px;
    }

    /* Card */
    .card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 32px;
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      margin-bottom: 24px;
    }

    .card-title {
      color: #fff;
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-title::before {
      content: '';
      width: 4px;
      height: 20px;
      background: linear-gradient(135deg, #1e78ff, #00c6ff);
      border-radius: 2px;
    }

    /* Form */
    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      margin-bottom: 8px;
      font-weight: 500;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 13px 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: all 0.3s;
    }
    .form-group input::placeholder,
    .form-group textarea::placeholder { color: rgba(255,255,255,0.3); }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: #1e78ff;
      background: rgba(30,120,255,0.1);
      box-shadow: 0 0 0 3px rgba(30,120,255,0.2);
    }
    .form-group textarea {
      min-height: 80px;
      resize: vertical;
    }
    .form-group select option {
      background: #302b63;
      color: #fff;
    }

    /* File Upload */
    .upload-area {
      border: 2px dashed rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
    }
    .upload-area:hover {
      border-color: #1e78ff;
      background: rgba(30,120,255,0.05);
    }
    .upload-area input[type="file"] {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }
    .upload-area .icon {
      font-size: 32px;
      margin-bottom: 8px;
    }
    .upload-area .text {
      color: rgba(255,255,255,0.6);
      font-size: 14px;
    }
    .upload-area .subtext {
      color: rgba(255,255,255,0.4);
      font-size: 12px;
      margin-top: 4px;
    }

    /* Uploaded Images */
    .uploaded-images {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
    .uploaded-image {
      position: relative;
      width: 80px;
      height: 80px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .uploaded-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .uploaded-image .remove {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 20px;
      height: 20px;
      background: rgba(255,77,77,0.9);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 12px;
      color: #fff;
    }

    /* Button */
    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #1e78ff, #00c6ff);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 8px;
      letter-spacing: 1px;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(30,120,255,0.5); }
    .btn:active { transform: translateY(0); }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .btn .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error & Success */
    .error-msg {
      display: none;
      background: rgba(255,77,77,0.15);
      border: 1px solid rgba(255,77,77,0.3);
      border-radius: 10px;
      padding: 12px 16px;
      color: #ff6b6b;
      font-size: 13px;
      margin-top: 14px;
      text-align: center;
    }
    .success-msg {
      display: none;
      background: rgba(77,255,77,0.15);
      border: 1px solid rgba(77,255,77,0.3);
      border-radius: 10px;
      padding: 12px 16px;
      color: #6bff6b;
      font-size: 13px;
      margin-top: 14px;
      text-align: center;
    }

    /* Status */
    .status-box {
      display: none;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
    }
    .status-box.show { display: block; }
    .status-title {
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      margin-bottom: 12px;
    }
    .status-indicator {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    .status-dot.pending { background: #ffd700; }
    .status-dot.success { background: #4ade80; animation: none; }
    .status-dot.error { background: #ff6b6b; animation: none; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .status-text {
      color: #fff;
      font-size: 15px;
      font-weight: 500;
    }
    .result-image {
      margin-top: 16px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .result-image img {
      width: 100%;
      display: block;
    }
    .result-url {
      margin-top: 12px;
      padding: 12px;
      background: rgba(0,0,0,0.3);
      border-radius: 8px;
      word-break: break-all;
    }
    .result-url a {
      color: #1e78ff;
      text-decoration: none;
      font-size: 13px;
    }
    .result-url a:hover {
      text-decoration: underline;
    }

    /* Form Row */
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    /* Update time */
    .update-time {
      text-align: center;
      color: rgba(255,255,255,0.3);
      font-size: 11px;
      margin-top: 14px;
    }

    /* Mode badge */
    .mode-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      margin-top: 10px;
    }
    .mode-badge .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #4ade80;
      animation: pulse 2s infinite;
    }

    /* Reference URLs */
    .ref-urls-list {
      margin-top: 8px;
    }
    .ref-url-item {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
      align-items: center;
    }
    .ref-url-item input {
      flex: 1;
    }
    .ref-url-item .btn-small {
      padding: 8px 12px;
      font-size: 12px;
      width: auto;
      margin-top: 0;
    }
    .add-url-btn {
      background: rgba(255,255,255,0.1);
      border: 1px dashed rgba(255,255,255,0.3);
      color: rgba(255,255,255,0.6);
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      text-align: center;
      font-size: 13px;
      transition: all 0.3s;
    }
    .add-url-btn:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.5);
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
    </div>
    <h1>API 点数查询</h1>
    <p>登录账号，实时查看点数使用情况</p>
  </div>

  <!-- Points Query Card -->
  <div class="card">
    <div class="card-title">点数查询</div>
    <div id="loginSection">
      <div class="form-group">
        <label>邮箱账号</label>
        <input type="email" id="email" placeholder="请输入邮箱" autocomplete="email">
      </div>
      <div class="form-group">
        <label>登录密码</label>
        <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password">
      </div>
      <div class="form-group" style="display: flex; align-items: center; gap: 8px;">
        <input type="checkbox" id="rememberMe" style="width: auto;" checked>
        <label for="rememberMe" style="margin: 0; font-size: 13px; color: rgba(255,255,255,0.6);">记住账号（仅保存在本地浏览器）</label>
      </div>
      <button class="btn" id="loginBtn" onclick="doLogin()">
        查询点数信息
      </button>
      <div class="error-msg" id="errorMsg"></div>
    </div>

    <div id="resultSection" style="display: none;">
      <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 20px;">
        <div style="background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 16px 12px; text-align: center;">
          <div style="font-size: 24px; font-weight: 700; color: #a8edea; margin-bottom: 6px;" id="todayUsage">-</div>
          <div style="font-size: 11px; color: rgba(255,255,255,0.5);">今日使用量</div>
        </div>
        <div style="background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 16px 12px; text-align: center;">
          <div style="font-size: 24px; font-weight: 700; color: #ffd89b; margin-bottom: 6px;" id="usedPoints">-</div>
          <div style="font-size: 11px; color: rgba(255,255,255,0.5);">已用点数</div>
        </div>
        <div style="background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 16px 12px; text-align: center;">
          <div style="font-size: 24px; font-weight: 700; color: #1e78ff; margin-bottom: 6px;" id="availQuota">-</div>
          <div style="font-size: 11px; color: rgba(255,255,255,0.5);">可用额度</div>
        </div>
      </div>
      <button class="btn" onclick="doLogout()" style="background: rgba(255,255,255,0.1);">退出账号</button>
    </div>
  </div>

  <!-- Banana2 Image Generation Card -->
  <div class="card">
    <div class="card-title">Banana2 图片生成</div>
    
    <!-- API Key -->
    <div class="form-group">
      <label>API Key</label>
      <input type="text" id="bananaKey" placeholder="请输入你的 API Key">
    </div>

    <!-- Image Upload -->
    <div class="form-group">
      <label>上传参考图片（自动转换为 URL）</label>
      <div class="upload-area" id="uploadArea">
        <input type="file" id="imageUpload" accept="image/*" multiple onchange="handleImageUpload(event)">
        <div class="icon">📤</div>
        <div class="text">点击或拖拽上传图片</div>
        <div class="subtext">支持 jpg/png/gif，单文件≤5MB</div>
      </div>
      <div class="uploaded-images" id="uploadedImages"></div>
    </div>

    <!-- Prompt -->
    <div class="form-group">
      <label>提示词 (Prompt) *</label>
      <textarea id="prompt" placeholder="描述你想要生成的图片..."></textarea>
    </div>

    <!-- Size & Aspect Ratio -->
    <div class="form-row">
      <div class="form-group">
        <label>图片尺寸</label>
        <select id="size">
          <option value="1K" selected>1K（默认）</option>
          <option value="2K">2K</option>
          <option value="4K">4K</option>
        </select>
      </div>
      <div class="form-group">
        <label>图片比例</label>
        <select id="aspectRatio">
          <option value="auto" selected>自动（默认）</option>
          <option value="1:1">1:1</option>
          <option value="16:9">16:9</option>
          <option value="9:16">9:16</option>
          <option value="4:3">4:3</option>
          <option value="3:4">3:4</option>
          <option value="3:2">3:2</option>
          <option value="2:3">2:3</option>
          <option value="5:4">5:4</option>
          <option value="4:5">4:5</option>
          <option value="21:9">21:9</option>
        </select>
      </div>
    </div>

    <!-- Generate Button -->
    <button class="btn" id="generateBtn" onclick="generateImage()">
      🎨 生成图片
    </button>

    <!-- Error Message -->
    <div class="error-msg" id="bananaError"></div>

    <!-- Status Box -->
    <div class="status-box" id="statusBox">
      <div class="status-title">生成状态</div>
      <div class="status-indicator">
        <div class="status-dot pending" id="statusDot"></div>
        <div class="status-text" id="statusText">准备生成...</div>
      </div>
      <div class="result-image" id="resultImage" style="display: none;">
        <img src="" alt="Generated" id="resultImg">
      </div>
      <div class="result-url" id="resultUrl" style="display: none;">
        <a href="" target="_blank" id="resultLink"></a>
      </div>
    </div>
  </div>

</div>

<script>
// ============================================================
// 配置
// ============================================================
// 点数查询后端 - 本地服务地址
const POINTS_BACKEND = 'http://127.0.0.1:5299';
const TELEGRAPH_UPLOAD_URL = 'https://telegraph-image-92x.pages.dev/upload';
const BANANA2_GENERATE_URL = 'https://api.wuyinkeji.com/api/async/image_nanoBanana2';
const BANANA2_DETAIL_URL = 'https://api.wuyinkeji.com/api/async/detail';


// ============================================================
// 点数查询功能
// ============================================================
function setLoading(loading) {
  const btn = document.getElementById('loginBtn');
  if (loading) {
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>登录查询中...';
  } else {
    btn.disabled = false;
    btn.innerHTML = '查询点数信息';
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.style.display = 'block';
  
  // 针对 PythonAnywhere 403 错误的友好提示
  if (msg.includes('403') || msg.includes('Forbidden') || msg.includes('Tunnel connection failed')) {
    el.innerHTML = `
      <div style="text-align: left;">
        <strong>⚠️ 查询失败：服务器访问受限</strong><br><br>
        原因：当前部署环境无法直接访问 API 服务器<br><br>
        解决方案：<br>
        1. 使用本地后端服务（推荐）：<br>
        &nbsp;&nbsp;&nbsp;• 下载 <a href="点数查询服务.py" download style="color: #1e78ff;">点数查询服务.py</a><br>
        &nbsp;&nbsp;&nbsp;• 本地运行：<code style="background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px;">python 点数查询服务.py</code><br>
        &nbsp;&nbsp;&nbsp;• 访问：<code style="background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px;">http://127.0.0.1:5299</code><br><br>
        2. 或直接在官网查询 API 使用情况
      </div>
    `;
  } else {
    el.textContent = msg;
  }
}

function hideError() {
  document.getElementById('errorMsg').style.display = 'none';
}

function formatNumber(n) {
  if (n === null || n === undefined || n === '-') return '-';
  return Number(n).toLocaleString('zh-CN');
}

async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();

  if (!email || !password) {
    showError('请填写邮箱和密码');
    return;
  }

  hideError();
  setLoading(true);

  try {
    const resp = await fetch(POINTS_BACKEND + '/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: email, password: password }),
    });

    const result = await resp.json();

    if (result.success) {
      document.getElementById('loginSection').style.display = 'none';
      document.getElementById('resultSection').style.display = 'block';
      document.getElementById('todayUsage').textContent = formatNumber(result.data.today_usage);
      document.getElementById('usedPoints').textContent = formatNumber(result.data.used_points);
      document.getElementById('availQuota').textContent = formatNumber(result.data.avail_quota);
    } else {
      showError('查询失败：' + (result.message || '未知错误'));
    }
  } catch (e) {
    showError('网络错误：' + e.message);
  } finally {
    setLoading(false);
  }
}

function doLogout() {
  document.getElementById('resultSection').style.display = 'none';
  document.getElementById('loginSection').style.display = 'block';
  hideError();
}

// Enter key support
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && document.getElementById('loginSection').style.display !== 'none') {
    doLogin();
  }
});

// ============================================================
// 本地存储：记住账号
// ============================================================
const STORAGE_KEY = 'api_credentials';

// 页面加载时读取保存的账号
function loadSavedCredentials() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const data = JSON.parse(saved);
      document.getElementById('email').value = data.email || '';
      document.getElementById('password').value = data.password || '';
      document.getElementById('rememberMe').checked = true;
    }
  } catch (e) {
    console.log('读取保存的账号失败:', e);
  }
}

// 保存账号到本地存储
function saveCredentials(email, password) {
  try {
    if (document.getElementById('rememberMe').checked) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ email, password }));
    } else {
      localStorage.removeItem(STORAGE_KEY);
    }
  } catch (e) {
    console.log('保存账号失败:', e);
  }
}

// 修改 doLogin 函数，在成功登录后保存账号
const originalDoLogin = doLogin;
doLogin = async function() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();
  
  if (!email || !password) {
    showError('请填写邮箱和密码');
    return;
  }
  
  // 调用原始登录函数
  await originalDoLogin();
  
  // 如果登录成功，保存账号
  const errorMsg = document.getElementById('errorMsg');
  if (errorMsg.style.display === 'none' || errorMsg.textContent === '') {
    saveCredentials(email, password);
  }
};

// 页面加载时执行
loadSavedCredentials();

// ============================================================
// Banana2 图片生成功能
// ============================================================
let uploadedImageUrls = [];
let pollInterval = null;

// 处理图片上传 - 通过 Telegraph 图床
async function handleImageUpload(event) {
  const files = event.target.files;
  if (!files.length) return;

  const uploadArea = document.getElementById('uploadArea');
  const originalContent = uploadArea.innerHTML;

  for (const file of files) {
    if (file.size > 5 * 1024 * 1024) {
      showBananaError(`图片 ${file.name} 超过 5MB 限制`);
      continue;
    }

    // 显示上传中状态
    uploadArea.innerHTML = `
      <div class="icon">⏳</div>
      <div class="text">正在上传 ${file.name}...</div>
      <div class="subtext">请稍候</div>
    `;

    try {
      const formData = new FormData();
      formData.append('file', file);

      const resp = await fetch(TELEGRAPH_UPLOAD_URL, {
        method: 'POST',
        body: formData,
        signal: AbortSignal.timeout(60000)
      });

      const result = await resp.json();

      if (result && result[0] && result[0].src) {
        const imageUrl = 'https://telegraph-image-92x.pages.dev' + result[0].src;
        uploadedImageUrls.push(imageUrl);
        renderUploadedImages();
      } else {
        showBananaError(`上传失败: 返回格式错误`);
      }
    } catch (e) {
      console.error('Upload error:', e);
      if (e.name === 'AbortError') {
        showBananaError('上传超时，请重试');
      } else {
        showBananaError('上传失败: ' + e.message + ' (可能是 CORS 限制，请使用参考图 URL 手动输入)');
      }
    }
  }

  // 恢复上传区域
  uploadArea.innerHTML = originalContent;
  uploadArea.onclick = () => document.getElementById('imageUpload').click();
  document.getElementById('imageUpload').value = '';
}

// 渲染已上传的图片
function renderUploadedImages() {
  const container = document.getElementById('uploadedImages');
  container.innerHTML = uploadedImageUrls.map((url, index) => `
    <div class="uploaded-image">
      <img src="${url}" alt="Uploaded" onerror="this.style.display='none'">
      <div class="remove" onclick="removeUploadedImage(${index})" title="删除">×</div>
    </div>
  `).join('');
}

// 删除已上传的图片
function removeUploadedImage(index) {
  uploadedImageUrls.splice(index, 1);
  renderUploadedImages();
}

// 显示错误信息
function showBananaError(msg) {
  const el = document.getElementById('bananaError');
  el.style.display = 'block';
  el.textContent = msg;
}

// 隐藏错误信息
function hideBananaError() {
  document.getElementById('bananaError').style.display = 'none';
}

// 生成图片
async function generateImage() {
  const key = document.getElementById('bananaKey').value.trim();
  const prompt = document.getElementById('prompt').value.trim();
  const size = document.getElementById('size').value;
  const aspectRatio = document.getElementById('aspectRatio').value;

  if (!key) {
    showBananaError('请输入 API Key');
    return;
  }
  if (!prompt) {
    showBananaError('请输入提示词');
    return;
  }

  hideBananaError();

  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>提交生成任务...';

  // 准备请求数据
  const requestData = {
    prompt: prompt,
    size: size,
    aspectRatio: aspectRatio,
    urls: uploadedImageUrls.length > 0 ? uploadedImageUrls : []
  };

  console.log('请求数据:', requestData);

  try {
    const resp = await fetch(`${BANANA2_GENERATE_URL}?key=${key}`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': key
      },
      body: JSON.stringify(requestData),
      signal: AbortSignal.timeout(30000)
    });

    const result = await resp.json();
    console.log('生成响应:', result);

    if (result.code === 200) {
      const taskId = result.data.id;
      showStatus('pending', '生成中...');
      startPolling(key, taskId);
    } else {
      showBananaError('提交失败: ' + (result.msg || '未知错误'));
      btn.disabled = false;
      btn.innerHTML = '🎨 生成图片';
    }
  } catch (e) {
    console.error('Generate error:', e);
    showBananaError('提交失败: ' + e.message);
    btn.disabled = false;
    btn.innerHTML = '🎨 生成图片';
  }
}

// 显示状态
function showStatus(status, text) {
  const box = document.getElementById('statusBox');
  const dot = document.getElementById('statusDot');
  const textEl = document.getElementById('statusText');

  box.classList.add('show');
  textEl.textContent = text;

  dot.className = 'status-dot ' + status;
}

// 开始轮询查询结果
function startPolling(key, taskId) {
  if (pollInterval) {
    clearInterval(pollInterval);
  }

  let pollCount = 0;
  const maxPolls = 40; // 最多轮询 40 次，每次 15 秒，总共 10 分钟

  const poll = async () => {
    pollCount++;
    if (pollCount > maxPolls) {
      clearInterval(pollInterval);
      showStatus('error', '查询超时');
      resetGenerateBtn();
      return;
    }

    try {
      const resp = await fetch(`${BANANA2_DETAIL_URL}?key=${key}&id=${taskId}`, {
        method: 'GET',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': key
        },
        signal: AbortSignal.timeout(30000)
      });

      const result = await resp.json();
      console.log('查询响应:', result);

      if (result.code === 200) {
        const data = result.data;
        const status = data.status;

        if (status === 0) {
          // 初始化/查询中
          showStatus('pending', `生成中... (${pollCount}/${maxPolls})`);
        } else if (status === 1) {
          // 进行中
          showStatus('pending', `生成进行中... (${pollCount}/${maxPolls})`);
        } else if (status === 2) {
          // 成功
          clearInterval(pollInterval);
          showStatus('success', '生成成功！');
          
          // 显示图片 - API返回的是result数组
          let imageUrl = null;
          if (data.result && Array.isArray(data.result) && data.result.length > 0) {
            imageUrl = data.result[0];
          } else if (data.imageUrl) {
            imageUrl = data.imageUrl;
          } else if (data.url) {
            imageUrl = data.url;
          }
          
          if (imageUrl) {
            document.getElementById('resultImg').src = imageUrl;
            document.getElementById('resultImage').style.display = 'block';
            document.getElementById('resultLink').href = imageUrl;
            document.getElementById('resultLink').textContent = imageUrl;
            document.getElementById('resultUrl').style.display = 'block';
          }
          resetGenerateBtn();
        } else if (status === 3) {
          // 失败
          clearInterval(pollInterval);
          showStatus('error', '生成失败: ' + (data.message || '未知错误'));
          resetGenerateBtn();
        }
      } else {
        showStatus('error', '查询失败: ' + (result.msg || '未知错误'));
        clearInterval(pollInterval);
        resetGenerateBtn();
      }
    } catch (e) {
      console.error('Poll error:', e);
      // 继续轮询，不中断
    }
  };

  // 立即执行一次
  poll();
  // 每 15 秒轮询一次
  pollInterval = setInterval(poll, 15000);
}

// 重置生成按钮
function resetGenerateBtn() {
  const btn = document.getElementById('generateBtn');
  btn.disabled = false;
  btn.innerHTML = '🎨 生成图片';
}
</script>
