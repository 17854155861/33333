<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API 点数查询工具</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 600px;
    }

    /* Logo & Title */
    .header {
      text-align: center;
      margin-bottom: 32px;
    }
    .header .logo {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, #1e78ff, #00c6ff);
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
      box-shadow: 0 8px 32px rgba(30,120,255,0.4);
    }
    .header .logo svg { width: 28px; height: 28px; fill: #fff; }
    .header h1 {
      color: #fff;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 1px;
    }
    .header p {
      color: rgba(255,255,255,0.5);
      font-size: 13px;
      margin-top: 6px;
    }

    /* Card */
    .card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 32px;
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      margin-bottom: 24px;
    }

    .card-title {
      color: #fff;
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-title::before {
      content: '';
      width: 4px;
      height: 20px;
      background: linear-gradient(135deg, #1e78ff, #00c6ff);
      border-radius: 2px;
    }

    /* Form */
    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      margin-bottom: 8px;
      font-weight: 500;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 13px 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: all 0.3s;
    }
    .form-group input::placeholder,
    .form-group textarea::placeholder { color: rgba(255,255,255,0.3); }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: #1e78ff;
      background: rgba(30,120,255,0.1);
      box-shadow: 0 0 0 3px rgba(30,120,255,0.2);
    }
    .form-group textarea {
      min-height: 80px;
      resize: vertical;
    }
    .form-group select option {
      background: #302b63;
      color: #fff;
    }

    /* File Upload */
    .upload-area {
      border: 2px dashed rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
    }
    .upload-area:hover {
      border-color: #1e78ff;
      background: rgba(30,120,255,0.05);
    }
    .upload-area input[type="file"] {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }
    .upload-area .icon {
      font-size: 32px;
      margin-bottom: 8px;
    }
    .upload-area .text {
      color: rgba(255,255,255,0.6);
      font-size: 14px;
    }
    .upload-area .subtext {
      color: rgba(255,255,255,0.4);
      font-size: 12px;
      margin-top: 4px;
    }

    /* Uploaded Images */
    .uploaded-images {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
    .uploaded-image {
      position: relative;
      width: 80px;
      height: 80px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .uploaded-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .uploaded-image .remove {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 20px;
      height: 20px;
      background: rgba(255,77,77,0.9);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 12px;
      color: #fff;
    }

    /* Button */
    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #1e78ff, #00c6ff);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 8px;
      letter-spacing: 1px;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(30,120,255,0.5); }
    .btn:active { transform: translateY(0); }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .btn .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error & Success */
    .error-msg {
      display: none;
      background: rgba(255,77,77,0.15);
      border: 1px solid rgba(255,77,77,0.3);
      border-radius: 10px;
      padding: 12px 16px;
      color: #ff6b6b;
      font-size: 13px;
      margin-top: 14px;
      text-align: center;
    }
    .success-msg {
      display: none;
      background: rgba(77,255,77,0.15);
      border: 1px solid rgba(77,255,77,0.3);
      border-radius: 10px;
      padding: 12px 16px;
      color: #6bff6b;
      font-size: 13px;
      margin-top: 14px;
      text-align: center;
    }

    /* Status */
    .status-box {
      display: none;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
    }
    .status-box.show { display: block; }
    .status-title {
      color: #7c7cff;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .status-info {
      margin-bottom: 12px;
    }
    .status-badge {
      display: inline-block;
      background: rgba(124,124,255,0.15);
      border: 1px solid rgba(124,124,255,0.3);
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 13px;
      color: rgba(255,255,255,0.8);
      margin-bottom: 8px;
    }
    .status-badge.success {
      background: rgba(77,255,77,0.15);
      border-color: rgba(77,255,77,0.3);
      color: #4ade80;
    }
    .result-section {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    .url-label {
      color: rgba(255,255,255,0.6);
      font-size: 13px;
      margin-bottom: 8px;
    }
    .result-image {
      margin: 16px 0;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.05);
    }
    .result-image img {
      width: 100%;
      max-width: 400px;
      display: block;
      margin: 0 auto;
    }
    .status-indicator {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    .status-dot.pending { background: #ffd700; }
    .status-dot.success { background: #4ade80; animation: none; }
    .status-dot.error { background: #ff6b6b; animation: none; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .status-text {
      color: #fff;
      font-size: 15px;
      font-weight: 500;
    }
    .result-image {
      margin-top: 16px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .result-image img {
      width: 100%;
      display: block;
    }
    .result-url {
      margin-top: 12px;
      padding: 12px;
      background: rgba(0,0,0,0.3);
      border-radius: 8px;
      word-break: break-all;
    }
    .result-url a {
      color: #1e78ff;
      text-decoration: none;
      font-size: 13px;
    }
    .result-url a:hover {
      text-decoration: underline;
    }

    /* Form Row */
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    /* Update time */
    .update-time {
      text-align: center;
      color: rgba(255,255,255,0.3);
      font-size: 11px;
      margin-top: 14px;
    }

    /* Mode badge */
    .mode-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      margin-top: 10px;
    }
    .mode-badge .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #4ade80;
      animation: pulse 2s infinite;
    }

    /* Reference URLs */
    .ref-urls-list {
      margin-top: 8px;
    }
    .ref-url-item {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
      align-items: center;
    }
    .ref-url-item input {
      flex: 1;
    }
    .ref-url-item .btn-small {
      padding: 8px 12px;
      font-size: 12px;
      width: auto;
      margin-top: 0;
    }
    .add-url-btn {
      background: rgba(255,255,255,0.1);
      border: 1px dashed rgba(255,255,255,0.3);
      color: rgba(255,255,255,0.6);
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      text-align: center;
      font-size: 13px;
      transition: all 0.3s;
    }
    .add-url-btn:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.5);
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
    </div>
    <h1>API 点数查询</h1>
    <p>登录账号，实时查看点数使用情况</p>
  </div>

  <!-- Points Query Card -->
  <div class="card">
    <div class="card-title">点数查询</div>
    <div id="loginSection">
      <div class="form-group">
        <label>邮箱账号</label>
        <input type="email" id="email" placeholder="请输入邮箱" autocomplete="email">
      </div>
      <div class="form-group">
        <label>登录密码</label>
        <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password">
      </div>
      <button class="btn" id="loginBtn" onclick="doLogin()">
        查询点数信息
      </button>
      <div class="error-msg" id="errorMsg"></div>
    </div>

    <div id="resultSection" style="display: none;">
      <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 20px;">
        <div style="background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 16px 12px; text-align: center;">
          <div style="font-size: 24px; font-weight: 700; color: #a8edea; margin-bottom: 6px;" id="todayUsage">-</div>
          <div style="font-size: 11px; color: rgba(255,255,255,0.5);">今日使用量</div>
        </div>
        <div style="background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 16px 12px; text-align: center;">
          <div style="font-size: 24px; font-weight: 700; color: #ffd89b; margin-bottom: 6px;" id="usedPoints">-</div>
          <div style="font-size: 11px; color: rgba(255,255,255,0.5);">已用点数</div>
        </div>
        <div style="background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 16px 12px; text-align: center;">
          <div style="font-size: 24px; font-weight: 700; color: #1e78ff; margin-bottom: 6px;" id="availQuota">-</div>
          <div style="font-size: 11px; color: rgba(255,255,255,0.5);">可用额度</div>
        </div>
      </div>
      <button class="btn" onclick="doLogout()" style="background: rgba(255,255,255,0.1);">退出账号</button>
    </div>
  </div>

  <!-- Banana2 Image Generation Card -->
  <div class="card">
    <div class="card-title">Banana2 图片生成</div>
    
    <!-- API Key -->
    <div class="form-group">
      <label>API Key</label>
      <input type="password" id="bananaKey" placeholder="请输入你的 API Key">
    </div>

    <!-- Image Upload -->
    <div class="form-group">
      <label>上传参考图片（自动转为 Base64）</label>
      <div class="upload-area" onclick="document.getElementById('imageUpload').click()">
        <input type="file" id="imageUpload" accept="image/*" multiple onchange="handleImageUpload(event)">
        <div class="icon">📤</div>
        <div class="text">点击或拖拽上传图片</div>
        <div class="subtext">支持 jpg/png/gif，单文件≤5MB，自动转为 Base64 格式</div>
      </div>
      <div class="uploaded-images" id="uploadedImages"></div>
    </div>

    <!-- Reference URLs -->
    <div class="form-group">
      <label>参考图 URL（可选）</label>
      <div class="ref-urls-list" id="refUrlsList">
        <div class="ref-url-item">
          <input type="text" placeholder="https://example.com/image.jpg" class="ref-url-input">
        </div>
      </div>
      <div class="add-url-btn" onclick="addRefUrlInput()">+ 添加更多 URL</div>
    </div>

    <!-- Prompt -->
    <div class="form-group">
      <label>提示词 (Prompt) *</label>
      <textarea id="prompt" placeholder="描述你想要生成的图片..."></textarea>
    </div>

    <!-- Size & Aspect Ratio -->
    <div class="form-row">
      <div class="form-group">
        <label>图片尺寸</label>
        <select id="size">
          <option value="1K">1K（默认）</option>
          <option value="2K">2K</option>
          <option value="4K">4K</option>
        </select>
      </div>
      <div class="form-group">
        <label>图片比例</label>
        <select id="aspectRatio">
          <option value="auto">自动（默认）</option>
          <option value="1:1">1:1</option>
          <option value="16:9">16:9</option>
          <option value="9:16">9:16</option>
          <option value="4:3">4:3</option>
          <option value="3:4">3:4</option>
          <option value="3:2">3:2</option>
          <option value="2:3">2:3</option>
          <option value="5:4">5:4</option>
          <option value="4:5">4:5</option>
          <option value="21:9">21:9</option>
        </select>
      </div>
    </div>

    <!-- Generate Button -->
    <button class="btn" id="generateBtn" onclick="generateImage()">
      🎨 生成图片
    </button>
    <div class="error-msg" id="bananaError"></div>
    <div class="success-msg" id="bananaSuccess"></div>

    <!-- Status Box -->
    <div class="status-box" id="statusBox">
      <div class="status-title">◆ 生成状态</div>
      <div class="status-info" id="statusInfo" style="display: none;">
        <div class="status-badge" id="taskIdBadge"></div>
        <div class="status-badge pending" id="queryBadge"></div>
      </div>
      <div class="status-indicator">
        <div class="status-dot pending" id="statusDot"></div>
        <div class="status-text" id="statusText">生成中...</div>
      </div>
      <div class="update-time" id="statusTime"></div>
      <div class="result-section" id="resultSection" style="display: none;">
        <div class="status-title">◆ 生成结果</div>
        <div class="result-image" id="resultImage">
          <img src="" alt="Generated Image" id="resultImg">
        </div>
        <div class="result-url" id="resultUrl">
          <div class="url-label">图片URL：</div>
          <a href="" target="_blank" id="resultLink"></a>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================================
// 配置
// ============================================================
const POINTS_BACKEND = '';
const TELEGRAPH_UPLOAD_URL = 'https://telegraph-image-92x.pages.dev/upload';
const BANANA2_GENERATE_URL = 'https://api.wuyinkeji.com/api/async/image_nanoBanana2';
const BANANA2_DETAIL_URL = 'https://api.wuyinkeji.com/api/async/detail';

// ============================================================
// 点数查询功能
// ============================================================
function setLoading(loading) {
  const btn = document.getElementById('loginBtn');
  if (loading) {
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>登录查询中...';
  } else {
    btn.disabled = false;
    btn.innerHTML = '查询点数信息';
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.style.display = 'block';
  el.textContent = msg;
}

function hideError() {
  document.getElementById('errorMsg').style.display = 'none';
}

function formatNumber(n) {
  if (n === null || n === undefined || n === '-') return '-';
  return Number(n).toLocaleString('zh-CN');
}

async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();

  if (!email || !password) {
    showError('请填写邮箱和密码');
    return;
  }

  hideError();
  setLoading(true);

  try {
    const resp = await fetch('/api/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email, password: password }),
    });

    const result = await resp.json();

    if (result.success) {
      document.getElementById('loginSection').style.display = 'none';
      document.getElementById('resultSection').style.display = 'block';
      document.getElementById('todayUsage').textContent = formatNumber(result.data.today_usage);
      document.getElementById('usedPoints').textContent = formatNumber(result.data.used_points);
      document.getElementById('availQuota').textContent = formatNumber(result.data.avail_quota);
    } else {
      showError('查询失败：' + (result.message || '未知错误'));
    }
  } catch (e) {
    showError('网络错误：' + e.message);
  } finally {
    setLoading(false);
  }
}

function doLogout() {
  document.getElementById('resultSection').style.display = 'none';
  document.getElementById('loginSection').style.display = 'block';
  hideError();
}

// ============================================================
// Banana2 图片生成功能
// ============================================================
let uploadedImageUrls = [];
let pollInterval = null;

// 处理图片上传 - 上传到 Telegraph 图床
async function handleImageUpload(event) {
  const files = event.target.files;
  if (!files.length) return;

  for (const file of files) {
    if (file.size > 5 * 1024 * 1024) {
      showBananaError(`图片 ${file.name} 超过 5MB 限制`);
      continue;
    }

    try {
      showBananaSuccess('正在上传图片到 Cloudinary...');
      const imageUrl = await uploadToCloudinary(file);
      uploadedImageUrls.push(imageUrl);
      renderUploadedImages();
      hideBananaError();
      document.getElementById('bananaSuccess').style.display = 'none';
    } catch (e) {
      showBananaError('上传图片失败：' + e.message + '，请手动粘贴图片URL');
    }
  }
}

// Cloudinary 配置
const CLOUDINARY_CLOUD_NAME = 'dwrfjlxmp';
const CLOUDINARY_API_KEY = '971177915995463';
const CLOUDINARY_UPLOAD_PRESET = 'banana2_upload'; // 需要先在 Cloudinary 中创建

// 上传图片到 Cloudinary
async function uploadToCloudinary(file) {
  const formData = new FormData();
  formData.append('file', file);
  formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
  formData.append('api_key', CLOUDINARY_API_KEY);
  
  const uploadUrl = `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`;
  
  const response = await fetch(uploadUrl, {
    method: 'POST',
    body: formData
  });
  
  if (!response.ok) {
    const error = await response.json();
    throw new Error(error.error?.message || '上传失败: ' + response.status);
  }
  
  const data = await response.json();
  if (data && data.secure_url) {
    return data.secure_url;
  }
  throw new Error('上传返回格式错误');
}

// 压缩图片 - 更激进的压缩
function compressImage(file, maxWidth = 512, maxHeight = 512, quality = 0.7) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      let width = img.width;
      let height = img.height;
      
      // 按比例缩放
      if (width > maxWidth || height > maxHeight) {
        const ratio = Math.min(maxWidth / width, maxHeight / height);
        width *= ratio;
        height *= ratio;
      }
      
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(0, 0, width, height);
      ctx.drawImage(img, 0, 0, width, height);
      
      // 转为 JPEG base64（通常比 PNG 小）
      let base64 = canvas.toDataURL('image/jpeg', quality);
      
      // 如果还是太大，进一步压缩
      let attempts = 0;
      while (base64.length > 500000 && attempts < 3) { // 限制 500KB
        quality *= 0.8;
        base64 = canvas.toDataURL('image/jpeg', quality);
        attempts++;
      }
      
      resolve(base64);
    };
    img.onerror = reject;
    
    const reader = new FileReader();
    reader.onload = (e) => { img.src = e.target.result; };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// 文件转 Base64
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// 渲染已上传的图片
function renderUploadedImages() {
  const container = document.getElementById('uploadedImages');
  container.innerHTML = uploadedImageUrls.map((url, index) => `
    <div class="uploaded-image">
      <img src="${url}" alt="Uploaded">
      <div class="remove" onclick="removeUploadedImage(${index})">×</div>
    </div>
  `).join('');
}

// 删除已上传的图片
function removeUploadedImage(index) {
  uploadedImageUrls.splice(index, 1);
  renderUploadedImages();
}

// 添加参考 URL 输入框
function addRefUrlInput() {
  const container = document.getElementById('refUrlsList');
  const div = document.createElement('div');
  div.className = 'ref-url-item';
  div.innerHTML = `
    <input type="text" placeholder="https://example.com/image.jpg" class="ref-url-input">
    <button class="btn btn-small" onclick="this.parentElement.remove()">删除</button>
  `;
  container.appendChild(div);
}

// 获取所有参考图 URL
function getAllRefUrls() {
  const urls = [...uploadedImageUrls];
  const inputs = document.querySelectorAll('.ref-url-input');
  inputs.forEach(input => {
    if (input.value.trim()) {
      urls.push(input.value.trim());
    }
  });
  return urls;
}

// 显示错误信息
function showBananaError(msg) {
  const el = document.getElementById('bananaError');
  el.style.display = 'block';
  el.textContent = msg;
  document.getElementById('bananaSuccess').style.display = 'none';
}

function hideBananaError() {
  document.getElementById('bananaError').style.display = 'none';
}

function showBananaSuccess(msg) {
  const el = document.getElementById('bananaSuccess');
  el.style.display = 'block';
  el.textContent = msg;
  document.getElementById('bananaError').style.display = 'none';
}

// 生成图片
async function generateImage() {
  const key = document.getElementById('bananaKey').value.trim();
  const prompt = document.getElementById('prompt').value.trim();
  const size = document.getElementById('size').value;
  const aspectRatio = document.getElementById('aspectRatio').value;

  if (!key) {
    showBananaError('请输入 API Key');
    return;
  }
  if (!prompt) {
    showBananaError('请输入提示词');
    return;
  }

  hideBananaError();

  const refUrls = getAllRefUrls();
  const requestData = {
    prompt: prompt,
    size: size,
    aspectRatio: aspectRatio
  };
  if (refUrls.length > 0) {
    requestData.urls = refUrls;
  }

  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>提交生成任务...';

  try {
    const resp = await fetch(`${BANANA2_GENERATE_URL}?key=${key}`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': key
      },
      body: JSON.stringify(requestData)
    });

    const result = await resp.json();

    if (result.code === 200 && result.data && result.data.id) {
      showBananaSuccess('生成任务已提交，开始轮询结果...');
      startPolling(result.data.id, key);
    } else {
      showBananaError('提交失败：' + (result.msg || '未知错误'));
      btn.disabled = false;
      btn.innerHTML = '🎨 生成图片';
    }
  } catch (e) {
    showBananaError('请求失败：' + e.message);
    btn.disabled = false;
    btn.innerHTML = '🎨 生成图片';
  }
}

// 开始轮询结果
function startPolling(id, key) {
  const statusBox = document.getElementById('statusBox');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const statusTime = document.getElementById('statusTime');
  const statusInfo = document.getElementById('statusInfo');
  const taskIdBadge = document.getElementById('taskIdBadge');
  const queryBadge = document.getElementById('queryBadge');
  const resultSection = document.getElementById('resultSection');
  const resultImg = document.getElementById('resultImg');
  const resultLink = document.getElementById('resultLink');
  const btn = document.getElementById('generateBtn');

  statusBox.classList.add('show');
  statusInfo.style.display = 'block';
  taskIdBadge.textContent = `提交成功，任务ID: ${id}`;
  statusDot.className = 'status-dot pending';
  statusText.textContent = '生成中...';
  resultSection.style.display = 'none';

  let queryCount = 0;

  // 清除之前的轮询
  if (pollInterval) {
    clearInterval(pollInterval);
  }

  const poll = async () => {
    try {
      queryCount++;
      queryBadge.textContent = `生成中... (第${queryCount}次查询，每15秒)`;
      queryBadge.className = 'status-badge pending';

      const resp = await fetch(`${BANANA2_DETAIL_URL}?key=${key}&id=${id}`, {
        method: 'GET',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': key
        }
      });

      const result = await resp.json();

      if (result.code === 200 && result.data) {
        const status = result.data.status;
        const now = new Date().toLocaleString('zh-CN');
        statusTime.textContent = '最后更新：' + now;

        if (status === 0) {
          // 查询中，继续轮询
          statusText.textContent = '生成中...';
          statusDot.className = 'status-dot pending';
        } else if (status === 2) {
          // 成功
          statusText.textContent = '生成成功！';
          statusDot.className = 'status-dot success';
          queryBadge.textContent = `生成成功！(共查询${queryCount}次)`;
          queryBadge.className = 'status-badge success';
          clearInterval(pollInterval);
          btn.disabled = false;
          btn.innerHTML = '🎨 生成图片';

          // 显示结果
          if (result.data.url || result.data.image_url) {
            const imageUrl = result.data.url || result.data.image_url;
            resultImg.src = imageUrl;
            resultLink.href = imageUrl;
            resultLink.textContent = imageUrl;
            resultSection.style.display = 'block';
          }
        } else if (status === 3) {
          // 失败
          statusText.textContent = '生成失败：' + (result.data.message || '未知错误');
          statusDot.className = 'status-dot error';
          queryBadge.textContent = `生成失败 (共查询${queryCount}次)`;
          queryBadge.className = 'status-badge';
          clearInterval(pollInterval);
          btn.disabled = false;
          btn.innerHTML = '🎨 生成图片';
        }
      }
    } catch (e) {
      statusText.textContent = '查询出错：' + e.message;
      statusDot.className = 'status-dot error';
      queryBadge.textContent = `查询出错 (共查询${queryCount}次)`;
      clearInterval(pollInterval);
      btn.disabled = false;
      btn.innerHTML = '🎨 生成图片';
    }
  };

  // 立即执行一次
  poll();
  // 每15秒轮询一次
  pollInterval = setInterval(poll, 15000);
}

// Enter key support
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && document.getElementById('loginSection').style.display !== 'none') {
    doLogin();
  }
});
